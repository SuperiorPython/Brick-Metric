<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search | Brick Archive</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #ddd; border-radius: 6px; }
        .btn { padding: 12px 25px; background: #E3000B; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .set-card { background: white; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 20px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .set-card:hover { border-left: 5px solid #E3000B; transform: translateX(5px); }
        .thumb { width: 80px; height: 60px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="text-decoration:none;">← Home</a>
        <h1>Search Archive</h1>
        <div class="search-box">
            <input type="text" id="q" placeholder="Search sets...">
            <button class="btn" onclick="search()">SEARCH</button>
        </div>
        <div id="results"></div>
    </div>
    <script>
        let currentPage = 1;
let currentQuery = "";

async function search(page = 1) {
    const q = document.getElementById('q').value;
    if (!q) return;

    currentQuery = q;
    currentPage = page;

    const resDiv = document.getElementById('results');
    resDiv.innerHTML = "<p>Searching BrickMetric...</p>";

    try {
        const url = `https://brick-archive.onrender.com/search?q=${q}&page=${page}`;
    console.log("Attempting to fetch from:", url); // Debugging line

    const resp = await fetch(url);

    console.log("Server Response Status:", resp.status); // Should be 200

    if (!resp.ok) {
        throw new Error(`Server responded with status: ${resp.status}`);
    }

    const data = await resp.json();
    console.log("Data received:", data); // Debugging line

        resDiv.innerHTML = `<p style="color: #666;">Found ${data.total_results} sets</p>`;

        data.results.forEach(set => {
    const card = document.createElement('div');
    card.className = 'set-card';
    card.onclick = () => window.location.href = `page.html?id=${set.set_num}`;
    card.innerHTML = `
        <img src="${set.img_url || ''}" class="thumb">
        <div>
            <strong>${set.name}</strong> (${set.year})<br>
            <small>#${set.set_num} | ${set.num_parts} parts</small>
        </div>
    `;
    resultsDiv.appendChild(card);
});

        // Pagination Controls
        if (data.total_pages > 1) {
            const nav = document.createElement('div');
            nav.style.margin = "20px 0";
            nav.innerHTML = `
                <button class="btn" onclick="search(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>PREV</button>
                <span style="margin: 0 15px;">Page ${currentPage} of ${data.total_pages}</span>
                <button class="btn" onclick="search(${currentPage + 1})" ${currentPage === data.total_pages ? 'disabled' : ''}>NEXT</button>
            `;
            resDiv.appendChild(nav);
        }
    } catch (err) {
        console.error("The exact error is:", err); // This WILL show up in the console now
        resDiv.innerHTML = `Connection Error: ${err.message}`;
    }
}
    </script>
</body>
</html>
